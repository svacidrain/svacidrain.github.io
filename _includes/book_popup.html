<!-- Book Popup Modal -->
<div id="book-popup-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; overflow-y:auto; -webkit-overflow-scrolling:touch;">
    <div style="position:relative; max-width:600px; margin:40px auto; background:#fff; border-radius:6px; overflow:hidden; box-shadow:0 5px 30px rgba(0,0,0,0.4);">
        <!-- Close button -->
        <button id="book-popup-close" style="position:absolute; top:10px; right:14px; background:none; border:none; font-size:28px; color:#999; cursor:pointer; z-index:10000; line-height:1;">&times;</button>
        <div style="padding:30px 30px 10px; text-align:center;">
            <h3 style="margin:0 0 5px; font-family:Montserrat,'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:14px; text-transform:uppercase; letter-spacing:2px; color:#999;">New Book by Captain Alex</h3>
            <h2 style="margin:0 0 20px; font-family:Montserrat,'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:24px; text-transform:uppercase; color:#333;">The Edge of Life</h2>
        </div>
        <a href="https://www.amazon.com/EDGE-LIFE-Risk-Worth-Taking/dp/1969589183" target="_blank" rel="noopener" style="display:block; text-align:center; padding:0 30px;">
            <img src="{{ site.baseurl }}/img/book-cover.jpg" alt="The Edge of Life - A Risk Worth Taking by Alex Carter" style="max-width:260px; width:100%; height:auto; border-radius:4px; box-shadow:0 4px 15px rgba(0,0,0,0.2);">
        </a>
        <div style="padding:20px 30px 30px;">
            <p style="font-family:'Droid Serif','Helvetica Neue',Helvetica,Arial,sans-serif; font-size:14px; line-height:1.7; color:#555; font-style:italic; text-align:center; margin:0 0 20px;">
                A true story of chasing dreams, falling in love, disaster, tragedy and survival against insurmountable odds.
            </p>
            <div style="text-align:center;">
                <a href="https://www.amazon.com/EDGE-LIFE-Risk-Worth-Taking/dp/1969589183" target="_blank" rel="noopener" style="display:inline-block; padding:14px 36px; background-color:#fed136; color:#fff; text-decoration:none; text-transform:uppercase; font-family:Montserrat,'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:700; font-size:14px; border-radius:3px; letter-spacing:1px;">Get It on Amazon</a>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var overlay = document.getElementById('book-popup-overlay');
    var closeBtn = document.getElementById('book-popup-close');

    // Show popup after a short delay
    setTimeout(function() {
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }, 1500);

    function closePopup() {
        overlay.style.display = 'none';
        document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closePopup);

    overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
            closePopup();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closePopup();
        }
    });
})();
</script>
